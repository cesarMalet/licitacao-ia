<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Análise de Licitações com IA</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      padding: 20px;
    }

    .cabecalho {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .logo {
       width: 80px;
    }

    button {
      padding: 10px 15px;
      margin-right: 4px; /* 👈 espaço de 4 */
      cursor: pointer;
    }

    .btn-pdf {
      margin-left: 4px;
    }

    .cabecalho h2 {
      color: #1e3a8a;
      margin: 0;
    }

    .relatorio {
      background: #ffffff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      line-height: 1.6;
    }

    .relatorio h2 {
      color: #1e3a8a;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 5px;
    }

    .relatorio h3 {
      color: #374151;
    }

    .relatorio table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
    }

    .relatorio table th {
      background: #1e3a8a;
      color: white;
      padding: 8px;
    }

    .relatorio table td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    .relatorio ul {
      margin-left: 20px;
    }
  </style>

</head>
<body>

  <h1>Análise de Licitações (Lei 14.133/21)</h1>

  <input type="file" id="fileInput" accept="application/pdf">
  <br><br>
  <button onclick="analisar()">Analisar</button>
  <button onclick="gerarPDF()" class="btn-pdf">Gerar PDF</button>

  <div class="cabecalho">
    <h2>Relatório de Análise de Licitação</h2>
    <img src="logo.png" class="logo">
  </div>

  <h2>Resultado:</h2>
  <div id="resultado" class="relatorio"></div>

  <script>
    const API_URL = "https://licitacao-ia-0bjj.onrender.com/analisar";

    async function analisar() {
      const fileInput = document.getElementById("fileInput");
      const resultado = document.getElementById("resultado");

      if (!fileInput.files.length) {
        alert("Selecione um arquivo PDF");
        return;
      }

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);

      resultado.innerText = "Analisando... aguarde ⏳";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        resultado.innerHTML = marked.parse(data.resultado || "Erro na análise");

      } catch (error) {
        resultado.innerText = "Erro ao conectar com o servidor";
        console.error(error);
      }
    }

  async function gerarPDF() {
    const elemento = document.getElementById("resultado");

    if (!elemento.innerHTML.trim()) {
      alert("Nenhum relatório para exportar");
      return;
    }

    let nomeArquivo = prompt("Digite o nome do arquivo:", "relatorio_licitacao");
    if (!nomeArquivo) nomeArquivo = "relatorio_licitacao";

    const canvas = await html2canvas(elemento, {
      scale: 2
    });

    const imgData = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const imgWidth = 210;
    const pageHeight = 297;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    pdf.save(nomeArquivo + ".pdf");
  }

</script>

</body>
</html>
